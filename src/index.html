<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图片背景移除</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover {
      background: #e8ebff;
      border-color: #764ba2;
    }

    .upload-area.dragover {
      background: #d4d9ff;
      border-color: #764ba2;
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 10px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.9rem;
    }

    #fileInput {
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      color: #666;
      font-size: 1rem;
    }

    .result {
      display: none;
      margin-top: 30px;
    }

    .result.show {
      display: block;
    }

    .preview-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .preview-container {
        grid-template-columns: 1fr;
      }
    }

    .preview-box {
      text-align: center;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .preview-box .label {
      margin-top: 10px;
      color: #666;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .download-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .error {
      display: none;
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
    }

    .error.show {
      display: block;
    }

    .retry-btn {
      margin-top: 10px;
      padding: 8px 20px;
      background: #c33;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #999;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 AI 图片背景移除</h1>
    <p class="subtitle">上传图片，一键去除背景</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📤</div>
      <p class="upload-text">点击或拖拽图片到此处</p>
      <p class="upload-hint">支持 JPG、PNG 格式，最大 10MB</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">AI 正在处理中，请稍候...</p>
    </div>

    <div class="error" id="error">
      <p id="errorText"></p>
      <button class="retry-btn" onclick="reset()">重新上传</button>
    </div>

    <div class="result" id="result">
      <div class="preview-container">
        <div class="preview-box">
          <img id="originalPreview" alt="原图">
          <div class="label">原图</div>
        </div>
        <div class="preview-box">
          <img id="resultPreview" alt="去除背景后">
          <div class="label">去除背景后</div>
        </div>
      </div>
      <button class="download-btn" id="downloadBtn">⬇️ 下载透明背景图片</button>
    </div>

    <div class="footer">
      Powered by Remove.bg API | Built with Cloudflare Workers
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const error = document.getElementById('error');
    const errorText = document.getElementById('errorText');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');

    let resultBlobUrl = null;

    // 点击上传
    uploadArea.addEventListener('click', () => fileInput.click());

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) processImage(file);
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        const file = files[0];
        if (file.type.startsWith('image/')) {
          processImage(file);
        } else {
          showError('请上传图片文件（JPG 或 PNG）');
        }
      }
    });

    async function processImage(file) {
      // 验证文件类型
      const allowedTypes = ['image/jpeg', 'image/png', 'image/jpg'];
      if (!allowedTypes.includes(file.type)) {
        showError('不支持的文件格式，请上传 JPG 或 PNG 图片');
        return;
      }

      // 验证文件大小
      const maxSize = 10 * 1024 * 1024; // 10MB
      if (file.size > maxSize) {
        showError('文件过大，请上传小于 10MB 的图片');
        return;
      }

      // 显示原图预览
      originalPreview.src = URL.createObjectURL(file);

      // 显示加载状态
      uploadArea.style.display = 'none';
      loading.classList.add('show');
      error.classList.remove('show');
      result.classList.remove('show');

      try {
        const formData = new FormData();
        formData.append('image', file);

        // 调用 API
        // 注意：请替换为你的 Worker 地址
        const apiUrl = '/api/remove-bg'; // 相对路径，适合同域部署
        // const apiUrl = 'https://your-worker.your-subdomain.workers.dev'; // 跨域部署时使用

        const response = await fetch(apiUrl, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || '处理失败，请重试');
        }

        // 获取结果图片
        const blob = await response.blob();

        // 清理之前的 URL
        if (resultBlobUrl) {
          URL.revokeObjectURL(resultBlobUrl);
        }

        resultBlobUrl = URL.createObjectURL(blob);

        // 显示结果
        resultPreview.src = resultBlobUrl;
        loading.classList.remove('show');
        result.classList.add('show');

        // 下载按钮
        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = resultBlobUrl;
          a.download = `no-bg-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };

      } catch (err) {
        console.error('Error:', err);
        loading.classList.remove('show');
        showError(err.message || '网络错误，请检查连接后重试');
      }
    }

    function showError(message) {
      errorText.textContent = message;
      error.classList.add('show');
      uploadArea.style.display = 'block';
    }

    function reset() {
      fileInput.value = '';
      error.classList.remove('show');
      result.classList.remove('show');
      uploadArea.style.display = 'block';
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
    }

    // 页面卸载时清理
    window.addEventListener('beforeunload', () => {
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
      }
    });
  </script>
</body>
</html>
